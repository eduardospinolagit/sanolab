<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Blog — Sano Lab</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#22c55e;--g2:#16a34a;--bg:#0a0a0a;--card:#111;--card2:#141414;--brd:rgba(255,255,255,.08);--lt:#f0f0f0;--gr:#666;--gr2:#888}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--lt);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
.container{width:100%;max-width:900px;margin:0 auto;padding:0 24px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center}
.login-box h2{font-size:1.4rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.login-box p{font-size:.85rem;color:var(--gr);margin-bottom:28px}
.login-field{text-align:left;margin-bottom:16px}
.login-field label{display:block;font-size:.76rem;color:var(--gr2);font-weight:500;margin-bottom:5px}
.login-field input{width:100%;background:#0d0d0d;border:1px solid var(--brd);border-radius:8px;color:var(--lt);font-family:'Inter',sans-serif;font-size:.9rem;padding:11px 14px;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:rgba(34,197,94,.4)}
.login-err{font-size:.8rem;color:#f87171;margin-top:-8px;margin-bottom:12px;display:none}
.btn-login{width:100%;padding:12px;border-radius:8px;background:var(--g);color:#fff;font-size:.9rem;font-weight:600;font-family:'Inter',sans-serif;border:none;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-login:hover{background:var(--g2)}

/* ADMIN */
#admin-screen{display:none}
header{padding:16px 0;border-bottom:1px solid var(--brd);background:rgba(10,10,10,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.header-inner h1{font-size:1.05rem;font-weight:700}
.header-inner span{font-size:.78rem;color:var(--gr)}
.btn-logout{padding:7px 14px;border-radius:7px;border:1px solid var(--brd);color:var(--gr2);font-size:.78rem;font-weight:500;background:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-logout:hover{border-color:rgba(255,255,255,.2);color:var(--lt)}

main{padding:40px 0}
.tabs{display:flex;gap:2px;margin-bottom:32px;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:4px}
.tab{flex:1;padding:9px 16px;border-radius:7px;font-size:.83rem;font-weight:500;cursor:pointer;text-align:center;transition:all .2s;border:none;background:none;font-family:'Inter',sans-serif;color:var(--gr)}
.tab.on{background:var(--bg);color:var(--lt);border:1px solid var(--brd)}

/* FORM */
#tab-new{display:block}
#tab-posts{display:none}
.form-section h2{font-size:1rem;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.f-field{display:flex;flex-direction:column;gap:5px}
.f-field.full{grid-column:1/-1}
.f-field label{font-size:.76rem;color:var(--gr2);font-weight:500}
.f-field label span{color:#f87171;margin-left:2px}
.f-field input,.f-field select,.f-field textarea{background:#0d0d0d;border:1px solid var(--brd);border-radius:8px;color:var(--lt);font-family:'Inter',sans-serif;font-size:.87rem;padding:10px 13px;outline:none;transition:border-color .2s;resize:vertical}
.f-field input:focus,.f-field select:focus,.f-field textarea:focus{border-color:rgba(34,197,94,.4)}
.char-count{font-size:.7rem;color:#444;text-align:right;margin-top:2px}
.form-actions{display:flex;gap:10px;margin-top:16px}
.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:8px;font-size:.87rem;font-weight:600;background:var(--g);color:#fff;border:none;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--g2)}
.btn-outline{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:8px;font-size:.87rem;font-weight:500;background:transparent;color:var(--lt);border:1px solid var(--brd);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-outline:hover{border-color:rgba(255,255,255,.2)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--g);color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:500;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:none}

/* POSTS LIST */
.posts-list{display:flex;flex-direction:column;gap:12px}
.post-item{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:18px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.post-item:hover{border-color:rgba(34,197,94,.2)}
.post-item h3{font-size:.9rem;font-weight:600;margin-bottom:4px;line-height:1.4}
.post-meta{font-size:.75rem;color:var(--gr);display:flex;align-items:center;gap:8px}
.post-cat{padding:2px 8px;border-radius:999px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);font-size:.68rem;font-weight:600;color:var(--g)}
.post-actions{display:flex;gap:8px;flex-shrink:0}
.btn-edit,.btn-del{padding:6px 12px;border-radius:7px;font-size:.75rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;border:1px solid var(--brd);background:none;color:var(--gr2)}
.btn-edit:hover{border-color:rgba(34,197,94,.3);color:var(--g)}
.btn-del:hover{border-color:rgba(248,113,113,.3);color:#f87171}
.empty-state{text-align:center;padding:48px 0;color:var(--gr);font-size:.9rem}

/* SLUG PREVIEW */
.slug-preview{font-size:.72rem;color:#444;margin-top:3px;font-family:monospace}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div style="width:48px;height:48px;border-radius:12px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Admin · Blog</h2>
    <p>Sano Lab — área restrita</p>
    <div class="login-field"><label>Senha</label><input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <p class="login-err" id="login-err">Senha incorreta.</p>
    <button class="btn-login" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="container header-inner">
      <div><h1>Admin · Blog</h1><span>Sano Lab</span></div>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>
  <main>
    <div class="container">
      <div class="tabs">
        <button class="tab on" onclick="switchTab('new',this)">Novo post</button>
        <button class="tab" onclick="switchTab('posts',this)">Posts publicados</button>
      </div>

      <!-- NOVO POST -->
      <div id="tab-new" class="form-section">
        <h2 id="form-title">Novo post</h2>
        <input type="hidden" id="edit-id"/>
        <div class="form-grid">
          <div class="f-field full"><label>Título <span>*</span></label><input type="text" id="f-title" placeholder="Ex: 5 motivos para ter um site profissional" oninput="genSlug()"/><div class="slug-preview" id="slug-preview">URL: /blog/</div></div>
          <div class="f-field"><label>Categoria <span>*</span></label>
            <select id="f-cat">
              <option>Sites</option><option>Automação</option><option>Tráfego</option>
              <option>E-commerce</option><option>Negócios</option><option>Dicas</option>
            </select>
          </div>
          <div class="f-field"><label>Autor</label><input type="text" id="f-author" value="Eduardo Spínola"/></div>
          <div class="f-field full"><label>Resumo <span>*</span> <small style="color:#444;font-weight:400">(aparece no card da listagem)</small></label><input type="text" id="f-summary" placeholder="Uma frase curta resumindo o post..." maxlength="160" oninput="document.getElementById('sum-count').textContent=this.value.length+'/160'"/><div class="char-count" id="sum-count">0/160</div></div>
          <div class="f-field full"><label>Conteúdo completo <span>*</span></label><textarea id="f-body" rows="12" placeholder="Escreva o conteúdo completo do artigo aqui. Separe parágrafos com uma linha em branco.&#10;&#10;Você pode estruturar com títulos usando ## Título e listas com - item."></textarea></div>
          <div class="f-field"><label>URL da imagem de capa <small style="color:#444;font-weight:400">(opcional)</small></label><input type="text" id="f-img" placeholder="https://..."/></div>
          <div class="f-field"><label>Palavras-chave SEO <small style="color:#444;font-weight:400">(separadas por vírgula)</small></label><input type="text" id="f-seo" placeholder="site profissional, criar site, google"/></div>
        </div>
        <div class="form-actions">
          <button class="btn-primary" onclick="savePost()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Publicar post
          </button>
          <button class="btn-outline" onclick="clearForm()">Limpar</button>
        </div>
      </div>

      <!-- LISTA DE POSTS -->
      <div id="tab-posts" style="display:none">
        <div id="posts-list" class="posts-list"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SENHA ── Troque aqui pela sua senha
const SENHA = 'sipos2026';

function doLogin(){
  const pwd=document.getElementById('pwd').value;
  if(pwd===SENHA){
    sessionStorage.setItem('admin_ok','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    renderPosts();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('pwd').value='';
  }
}
function logout(){sessionStorage.removeItem('admin_ok');location.reload()}
if(sessionStorage.getItem('admin_ok')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
}

// ── TABS ──
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-new').style.display=name==='new'?'block':'none';
  document.getElementById('tab-posts').style.display=name==='posts'?'block':'none';
  if(name==='posts')renderPosts();
}

// ── SLUG ──
function genSlug(){
  const t=document.getElementById('f-title').value;
  const slug=t.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'').trim()
    .replace(/\s+/g,'-').replace(/-+/g,'-').substring(0,60);
  document.getElementById('slug-preview').textContent='URL: /blog/'+(slug||'');
  return slug;
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── POSTS (localStorage) ──
function getPosts(){return JSON.parse(localStorage.getItem('sipos_blog_v2')||'[]')}
function savePosts(p){localStorage.setItem('sipos_blog_v2',JSON.stringify(p))}

function savePost(){
  const title=document.getElementById('f-title').value.trim();
  const summary=document.getElementById('f-summary').value.trim();
  const body=document.getElementById('f-body').value.trim();
  if(!title||!summary||!body){showToast('Preencha título, resumo e conteúdo.');return}
  const slug=genSlug();
  const editId=document.getElementById('edit-id').value;
  const posts=getPosts();
  if(editId){
    const idx=posts.findIndex(p=>p.id==editId);
    if(idx>-1){
      posts[idx]={...posts[idx],title,summary,body,cat:document.getElementById('f-cat').value,author:document.getElementById('f-author').value.trim()||'Eduardo Spínola',img:document.getElementById('f-img').value.trim(),seo:document.getElementById('f-seo').value.trim(),slug,updatedAt:new Date().toISOString()};
      savePosts(posts);showToast('Post atualizado!');clearForm();return;
    }
  }
  const post={id:Date.now(),title,summary,body,cat:document.getElementById('f-cat').value,author:document.getElementById('f-author').value.trim()||'Eduardo Spínola',img:document.getElementById('f-img').value.trim(),seo:document.getElementById('f-seo').value.trim(),slug,date:new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}),createdAt:new Date().toISOString()};
  posts.unshift(post);savePosts(posts);
  showToast('Post publicado com sucesso!');clearForm();
}

function clearForm(){
  ['f-title','f-summary','f-body','f-img','f-seo','edit-id'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-author').value='Eduardo Spínola';
  document.getElementById('slug-preview').textContent='URL: /blog/';
  document.getElementById('sum-count').textContent='0/160';
  document.getElementById('form-title').textContent='Novo post';
}

function renderPosts(){
  const posts=getPosts();
  const el=document.getElementById('posts-list');
  if(!posts.length){el.innerHTML='<div class="empty-state">Nenhum post publicado ainda.</div>';return}
  el.innerHTML=posts.map(p=>`
    <div class="post-item">
      <div style="flex:1;min-width:0">
        <h3>${p.title}</h3>
        <div class="post-meta">
          <span class="post-cat">${p.cat}</span>
          <span>${p.date}</span>
          <span>· ${p.author}</span>
          <span style="font-family:monospace;font-size:.68rem;color:#333">/blog/${p.slug}</span>
        </div>
      </div>
      <div class="post-actions">
        <button class="btn-edit" onclick="editPost(${p.id})">Editar</button>
        <button class="btn-del" onclick="deletePost(${p.id})">Excluir</button>
      </div>
    </div>
  `).join('');
}

function editPost(id){
  const posts=getPosts();const p=posts.find(x=>x.id===id);if(!p)return;
  document.getElementById('f-title').value=p.title;
  document.getElementById('f-summary').value=p.summary;
  document.getElementById('f-body').value=p.body;
  document.getElementById('f-cat').value=p.cat;
  document.getElementById('f-author').value=p.author;
  document.getElementById('f-img').value=p.img||'';
  document.getElementById('f-seo').value=p.seo||'';
  document.getElementById('edit-id').value=p.id;
  document.getElementById('form-title').textContent='Editar post';
  document.getElementById('sum-count').textContent=p.summary.length+'/160';
  genSlug();
  switchTab('new',document.querySelectorAll('.tab')[0]);
  window.scrollTo({top:0,behavior:'smooth'});
}

function deletePost(id){
  if(!confirm('Excluir este post? Essa ação não pode ser desfeita.'))return;
  const posts=getPosts().filter(p=>p.id!==id);
  savePosts(posts);renderPosts();showToast('Post excluído.');
}
</script>
</body>
</html>
